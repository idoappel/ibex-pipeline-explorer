name: selftest
on: [push, pull_request]
jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fst2vcd and node
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gtkwave nodejs
      - name: Run self-test (regenerate from sample, assert cross-check PASS)
        run: ./selftest.sh
